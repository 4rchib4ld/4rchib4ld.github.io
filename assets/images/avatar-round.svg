<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <clipPath id="circle">
      <circle cx="200" cy="200" r="196"/>
    </clipPath>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0d0d"/>
      <stop offset="100%" style="stop-color:#1a1a1a"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="200" cy="200" r="200" fill="#0d0d0d"/>

  <!-- Content clipped to circle -->
  <g clip-path="url(#circle)">
    <rect width="400" height="400" fill="url(#bg)"/>

    <!-- Subtle grid -->
    <g opacity="0.05" stroke="#fff" stroke-width="0.5">
      <line x1="0" y1="80" x2="400" y2="80"/>
      <line x1="0" y1="160" x2="400" y2="160"/>
      <line x1="0" y1="240" x2="400" y2="240"/>
      <line x1="0" y1="320" x2="400" y2="320"/>
      <line x1="80" y1="0" x2="80" y2="400"/>
      <line x1="160" y1="0" x2="160" y2="400"/>
      <line x1="240" y1="0" x2="240" y2="400"/>
      <line x1="320" y1="0" x2="320" y2="400"/>
    </g>

    <!-- P -->
    <text x="52" y="205" font-family="'Courier New', monospace" font-size="88" fill="#efefef" font-weight="bold">P.</text>
    <!-- Redaction bar -->
    <rect x="52" y="218" width="296" height="44" rx="2" fill="#e8e8e8"/>
    <rect x="52" y="218" width="296" height="2" rx="1" fill="#fff" opacity="0.2"/>
    <!-- D -->
    <text x="52" y="288" font-family="'Courier New', monospace" font-size="88" fill="#efefef" font-weight="bold">D.</text>

    <!-- Bottom tagline -->
    <text x="200" y="348" font-family="'Courier New', monospace" font-size="9" fill="#444" letter-spacing="3" text-anchor="middle">CTI. ALLEGEDLY.</text>
  </g>

  <!-- Circle border -->
  <circle cx="200" cy="200" r="196" fill="none" stroke="#2a2a2a" stroke-width="2"/>
</svg>
